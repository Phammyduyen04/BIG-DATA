version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: crypto_dw_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: crypto_dw
    ports:
      - "5433:5432"
    volumes:
      - crypto_dw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: crypto_backend_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:your_password@postgres:5432/crypto_dw"
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy && npm start"

volumes:
  crypto_dw_postgres_data:


