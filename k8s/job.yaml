# ============================================================
# Kubernetes Job: Spark-Submit Native on K8s Cluster Mode
# Namespace: spark-etl
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-etl-submitter
  namespace: spark-etl
spec:
  template:
    spec:
      serviceAccountName: spark-job-sa
      restartPolicy: Never
      containers:
      - name: submitter
        image: huytrongbeou1310/bigdata_spark_postgresql:v1.1.9
        imagePullPolicy: Always
        # Command: Gọi spark-submit trực tiếp với cấu hình Cluster Mode
        command: ["/opt/spark/bin/spark-submit"]
        args:
          - "--master"
          - "k8s://https://kubernetes.default.svc"
          - "--deploy-mode"
          - "cluster"
          - "--name"
          - "CryptoDW-Production-Job"
          - "--conf"
          - "spark.kubernetes.namespace=spark-etl"
          - "--conf"
          - "spark.kubernetes.container.image=huytrongbeou1310/bigdata_spark_postgresql:v1.1.9"
          - "--conf"
          - "spark.kubernetes.container.imagePullPolicy=Always"
          - "--conf"
          - "spark.kubernetes.authenticate.driver.serviceAccountName=spark-job-sa"
          # Inject Env Vars cho Driver & Executors từ ConfigMap/Secret
          - "--conf"
          - "spark.kubernetes.driverEnv.MINIO_ENDPOINT=$(MINIO_ENDPOINT)"
          - "--conf"
          - "spark.kubernetes.driverEnv.MINIO_ACCESS_KEY=$(MINIO_ACCESS_KEY)"
          - "--conf"
          - "spark.kubernetes.driverEnv.MINIO_SECRET_KEY=$(MINIO_SECRET_KEY)"
          - "--conf"
          - "spark.kubernetes.driverEnv.MINIO_BUCKET=$(MINIO_BUCKET)"
          - "--conf"
          - "spark.kubernetes.driverEnv.MINIO_SECURE=$(MINIO_SECURE)"
          - "--conf"
          - "spark.kubernetes.driverEnv.JDBC_URL=$(JDBC_URL)"
          - "--conf"
          - "spark.kubernetes.driverEnv.JDBC_USER=$(JDBC_USER)"
          - "--conf"
          - "spark.kubernetes.driverEnv.JDBC_PASSWORD=$(JDBC_PASSWORD)"
          - "--conf"
          - "spark.kubernetes.driverEnv.DATA_BASE_PATH=$(DATA_BASE_PATH)"
          - "--conf"
          - "spark.kubernetes.driverEnv.TOP_N_SYMBOLS=$(TOP_N_SYMBOLS)"
          - "--conf"
          - "spark.executorEnv.MINIO_ENDPOINT=$(MINIO_ENDPOINT)"
          - "--conf"
          - "spark.executorEnv.MINIO_ACCESS_KEY=$(MINIO_ACCESS_KEY)"
          - "--conf"
          - "spark.executorEnv.MINIO_SECRET_KEY=$(MINIO_SECRET_KEY)"
          - "--conf"
          - "spark.executorEnv.MINIO_BUCKET=$(MINIO_BUCKET)"
          - "--conf"
          - "spark.executorEnv.MINIO_SECURE=$(MINIO_SECURE)"
          - "--conf"
          - "spark.executorEnv.JDBC_URL=$(JDBC_URL)"
          - "--conf"
          - "spark.executorEnv.JDBC_USER=$(JDBC_USER)"
          - "--conf"
          - "spark.executorEnv.JDBC_PASSWORD=$(JDBC_PASSWORD)"
          - "--conf"
          - "spark.executorEnv.DATA_BASE_PATH=$(DATA_BASE_PATH)"
          - "--conf"
          - "spark.executorEnv.TOP_N_SYMBOLS=$(TOP_N_SYMBOLS)"
          # Trỏ đến Entrypoint Launcher
          - "local:///opt/project/spark/jobs/launcher.py"
        env:
        # Load tất cả từ ConfigMap/Secret để Submitter truyền tham số
        - name: MINIO_ENDPOINT
          valueFrom: { configMapKeyRef: { name: etl-config, key: MINIO_ENDPOINT } }
        - name: MINIO_BUCKET
          valueFrom: { configMapKeyRef: { name: etl-config, key: MINIO_BUCKET } }
        - name: MINIO_SECURE
          valueFrom: { configMapKeyRef: { name: etl-config, key: MINIO_SECURE } }
        - name: DATA_BASE_PATH
          valueFrom: { configMapKeyRef: { name: etl-config, key: DATA_BASE_PATH } }
        - name: TOP_N_SYMBOLS
          valueFrom: { configMapKeyRef: { name: etl-config, key: TOP_N_SYMBOLS } }
        - name: JDBC_URL
          valueFrom: { configMapKeyRef: { name: etl-config, key: JDBC_URL } }
        - name: MINIO_ACCESS_KEY
          valueFrom: { secretKeyRef: { name: etl-secrets, key: MINIO_ACCESS_KEY } }
        - name: MINIO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: etl-secrets, key: MINIO_SECRET_KEY } }
        - name: JDBC_USER
          valueFrom: { secretKeyRef: { name: etl-secrets, key: JDBC_USER } }
        - name: JDBC_PASSWORD
          valueFrom: { secretKeyRef: { name: etl-secrets, key: JDBC_PASSWORD } }
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
