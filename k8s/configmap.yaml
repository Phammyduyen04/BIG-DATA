# ============================================================
# Kubernetes ConfigMap: Cấu hình chung (Namespace: spark-etl)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: spark-etl
data:
  # MinIO Internal Cluster DNS
  MINIO_ENDPOINT: "minio.default.svc.cluster.local:9000"
  MINIO_BUCKET: "binance"
  MINIO_SECURE: "false"
  
  # PostgreSQL Internal DNS (Giả định postgres chạy ở namespace default)
  JDBC_URL: "jdbc:postgresql://postgres.default.svc.cluster.local:5432/crypto_dw"
  
  # Spark Application Config
  SPARK_APP_NAME: "CryptoDW-K8s-Production"
  DATA_BASE_PATH: "s3a://binance/raw"
