# ============================================================
# Kubernetes ConfigMap: Cấu hình chung (Namespace: spark-etl)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: spark-etl
data:
  # MinIO Internal Cluster DNS
  MINIO_ENDPOINT: minio.bigdata.svc.cluster.local:9000
  MINIO_BUCKET: "binance"
  MINIO_SECURE: "false"
  
  # PostgreSQL Internal DNS (Postgres running in bigdata namespace)
  JDBC_URL: jdbc:postgresql://postgres.bigdata.svc.cluster.local:5432/crypto_dw
  
  # Spark Application Config
  TOP_N_SYMBOLS: "100"
  SPARK_APP_NAME: "CryptoDW-Spark-ETL-v1.4.0"
  DATA_BASE_PATH: "s3a://binance"
  MINIO_PREFIX_KLINES: "silver/klines/"
  MINIO_PREFIX_TICKER: "silver/ticker/"
  MINIO_PREFIX_DEPTH: "silver/depth/"
  MINIO_PREFIX_TRADES: "silver/trades/"
