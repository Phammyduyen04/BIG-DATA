# ============================================================
# Kubernetes Secret: Thông tin nhạy cảm
# Cách tạo: kubectl apply -f secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: etl-secrets
  namespace: default
type: Opaque
stringData:
  # MinIO Keys
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "Bigdata@MinIO2025"
  
  # PostgreSQL Credentials
  JDBC_USER: "dwuser"
  JDBC_PASSWORD: "dwpassword"
---
# ============================================================
# Kubernetes ConfigMap: Cấu hình chung
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: default
data:
  # MinIO
  MINIO_ENDPOINT: "100.74.195.110:30900"
  MINIO_BUCKET: "binance"
  MINIO_SECURE: "false"
  
  # PostgreSQL
  # Nếu Postgres chạy trong K8s, hãy đổi sang Service DNS
  JDBC_URL: "jdbc:postgresql://postgres.default.svc.cluster.local:5432/crypto_dw"
  
  # Spark App
  SPARK_APP_NAME: "CryptoDW-ETL-Production"
