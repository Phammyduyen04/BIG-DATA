apiVersion: v1
kind: Namespace
metadata:
  name: spark-etl
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-job-sa
  namespace: spark-etl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: spark-etl
  name: spark-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - persistentvolumeclaims
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - deletecollection
      - update
      - patch
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: spark-etl
subjects:
  - kind: ServiceAccount
    name: spark-job-sa
    namespace: spark-etl
roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
