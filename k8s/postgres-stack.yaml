# ============================================================
# PostgreSQL Infrastructure Stack (Production-Lite)
# Namespace: bigdata
# ============================================================

# 1. Namespace Definition
apiVersion: v1
kind: Namespace
metadata:
  name: bigdata
---

# 2. PostgreSQL Secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: bigdata
type: Opaque
stringData:
  POSTGRES_DB: "crypto_dw"
  POSTGRES_USER: "dwuser"
  POSTGRES_PASSWORD: "dwpassword"
---

# 3. PostgreSQL Init Script (from postgres/init.sql)
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: bigdata
data:
  init.sql: |
    -- ============================================================
    -- Crypto DW Schema (Auto-generated from SOT init.sql)
    -- ============================================================
    CREATE TABLE IF NOT EXISTS dim_symbols (
        symbol_id   BIGSERIAL    PRIMARY KEY,
        symbol_code VARCHAR(20)  UNIQUE NOT NULL,
        base_asset  VARCHAR(20),
        quote_asset VARCHAR(20),
        created_at  TIMESTAMP    DEFAULT NOW(),
        updated_at  TIMESTAMP    DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS fact_klines (
        kline_id               BIGSERIAL        PRIMARY KEY,
        symbol_id              BIGINT           NOT NULL,
        interval_code          VARCHAR(10)      NOT NULL,
        open_time              TIMESTAMP        NOT NULL,
        close_time             TIMESTAMP        NOT NULL,
        open_price             DECIMAL(30, 12)  NOT NULL,
        high_price             DECIMAL(30, 12)  NOT NULL,
        low_price              DECIMAL(30, 12)  NOT NULL,
        close_price            DECIMAL(30, 12)  NOT NULL,
        volume_base            DECIMAL(30, 12),
        volume_quote           DECIMAL(30, 12),
        num_trades             BIGINT,
        taker_buy_quote_volume DECIMAL(30, 12),
        CONSTRAINT uq_klines        UNIQUE (symbol_id, interval_code, open_time),
        CONSTRAINT fk_klines_symbol FOREIGN KEY (symbol_id) REFERENCES dim_symbols(symbol_id)
    );
    CREATE INDEX IF NOT EXISTS idx_klines_lookup ON fact_klines (symbol_id, interval_code, open_time DESC);

    CREATE TABLE IF NOT EXISTS fact_ticker_24h_snapshots (
        ticker_snapshot_id   BIGSERIAL       PRIMARY KEY,
        symbol_id            BIGINT          NOT NULL,
        snapshot_time        TIMESTAMP       NOT NULL,
        price_change         DECIMAL(30, 12),
        price_change_percent DECIMAL(18, 8),
        last_price           DECIMAL(30, 12),
        high_price           DECIMAL(30, 12),
        low_price            DECIMAL(30, 12),
        volume_base_24h      DECIMAL(30, 12),
        volume_quote_24h     DECIMAL(30, 12),
        trade_count          BIGINT,
        ingested_at          TIMESTAMP       DEFAULT NOW(),
        CONSTRAINT uq_ticker_snapshot  UNIQUE (symbol_id, snapshot_time),
        CONSTRAINT fk_ticker_symbol    FOREIGN KEY (symbol_id) REFERENCES dim_symbols(symbol_id)
    );
    CREATE INDEX IF NOT EXISTS idx_ticker_lookup ON fact_ticker_24h_snapshots (symbol_id, snapshot_time DESC);

    CREATE TABLE IF NOT EXISTS fact_recent_trades (
        raw_trade_sk   BIGSERIAL       PRIMARY KEY,
        symbol_id      BIGINT          NOT NULL,
        trade_id       BIGINT          NOT NULL,
        trade_time     TIMESTAMP       NOT NULL,
        price          DECIMAL(30, 12) NOT NULL,
        qty_base       DECIMAL(30, 12) NOT NULL,
        quote_qty      DECIMAL(30, 12),
        is_buyer_maker BOOLEAN,
        is_best_match  BOOLEAN,
        ingested_at    TIMESTAMP       DEFAULT NOW(),
        CONSTRAINT uq_recent_trades    UNIQUE (symbol_id, trade_id),
        CONSTRAINT fk_recent_symbol    FOREIGN KEY (symbol_id) REFERENCES dim_symbols(symbol_id)
    );
    CREATE INDEX IF NOT EXISTS idx_recent_trades_lookup ON fact_recent_trades (symbol_id, trade_time DESC);

    CREATE TABLE IF NOT EXISTS mart_trade_metrics (
        symbol_id         BIGINT          PRIMARY KEY,
        total_buy_volume  DECIMAL(30,12),
        total_sell_volume DECIMAL(30,12),
        money_flow        DECIMAL(30,12),
        total_trades      BIGINT,
        whale_threshold   DECIMAL(30,12),
        whale_buy_volume  DECIMAL(30,12),
        whale_sell_volume DECIMAL(30,12),
        whale_buy_ratio   DECIMAL(10,6),
        computed_at       TIMESTAMP        DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS mart_top_coins (
        id                  BIGSERIAL       PRIMARY KEY,
        timeframe           VARCHAR(10)     NOT NULL,
        rank                INT             NOT NULL,
        symbol_id           BIGINT          NOT NULL,
        symbol_code         VARCHAR(20)     NOT NULL,
        total_volume_quote  DECIMAL(30,12),
        total_num_trades    BIGINT,
        avg_taker_buy_ratio DECIMAL(10,6),
        bullish_ratio       DECIMAL(10,6),
        volume_trend        DECIMAL(10,4),
        money_flow          DECIMAL(30,12),
        whale_buy_ratio     DECIMAL(10,6),
        long_term_score     DECIMAL(10,4),
        signal              VARCHAR(20),
        computed_at         TIMESTAMP       DEFAULT NOW(),
        CONSTRAINT uq_top_coins UNIQUE (timeframe, rank, computed_at)
    );
---

# 4. PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: bigdata
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---

# 5. PostgreSQL Deployment
# NOTE: Using Deployment for production-lite. 
# StatefulSet is the standard approach for persistence-heavy production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bigdata
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secrets
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        # init.sql will only run if /var/lib/postgresql/data is empty
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-script
        configMap:
          name: postgres-init-sql
---

# 6. PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bigdata
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
